name: CI

permissions: {}

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  SOLC_VERSION: 0.8.30
  FANDANGO_VERSION: 1.1.1

jobs:
  test:
    name: test ${{ matrix.os }} ${{ matrix.rust }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: "ubuntu-latest"
            rust: "stable"
          - os: "macos-latest"
            rust: "stable"
          - os: "windows-latest"
            rust: "stable"
          - os: "ubuntu-latest"
            rust: "1.95" # MSRV
          - os: "ubuntu-latest"
            rust: "nightly"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          submodules: true
      - name: Checkout submodules
        run: git submodule update --checkout
      - name: Install LLVM (apt)
        if: matrix.os == 'ubuntu-latest'
        run: .github/scripts/install_llvm.sh ubuntu
      - name: Install LLVM (brew)
        if: matrix.os == 'macos-latest'
        run: .github/scripts/install_llvm.sh macos
      - uses: msys2/setup-msys2@66cd2cce69caa17b53920067426061ca1de3a884 # v2.32.0
        if: matrix.os == 'windows-latest'
        with:
          msystem: MINGW64
          update: true
          install: mingw-w64-x86_64-llvm
      - name: FileCheck
        if: matrix.os == 'windows-latest'
        shell: msys2 {0}
        run: |
          filecheck="$(command -v FileCheck)"
          "$filecheck" --version
          echo "FILECHECK=$(cygpath -w "$filecheck")" >> "$GITHUB_ENV"
      - name: llvm-config
        if: matrix.os != 'windows-latest'
        run: llvm-config --version --bindir --libdir
      - uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # master
        with:
          toolchain: ${{ matrix.rust }}
      - uses: taiki-e/install-action@5493e0f047e7f902b4c43c6e0760b2f40c585268 # nextest
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@c7450ba673e133f5ee30098b3b54f444d3a2ca2d # v1.8.0
        with:
          version: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          cache-on-failure: true
      - name: build
        run: cargo build
      - name: test
        run: cargo nextest run --workspace
      - name: Fandango runtime and source differentials
        if: matrix.os == 'ubuntu-latest' && matrix.rust == 'stable'
        run: |
          set -euo pipefail
          mkdir -p target/runtime-fuzz "$RUNNER_TEMP/solc"

          curl -fsSL \
            "https://github.com/ethereum/solidity/releases/download/v${SOLC_VERSION}/solc-static-linux" \
            -o "$RUNNER_TEMP/solc/solc-${SOLC_VERSION}"
          chmod +x "$RUNNER_TEMP/solc/solc-${SOLC_VERSION}"
          "$RUNNER_TEMP/solc/solc-${SOLC_VERSION}" --version

          python3 -m venv "$RUNNER_TEMP/fandango-venv"
          "$RUNNER_TEMP/fandango-venv/bin/pip" install "fandango-fuzzer==${FANDANGO_VERSION}"

          cargo build -p solar-compiler --bin solar

          anvil --silent --port 8545 > "$RUNNER_TEMP/fandango-anvil.log" 2>&1 &
          anvil_pid=$!
          cleanup() {
            kill "$anvil_pid" 2>/dev/null || true
            wait "$anvil_pid" 2>/dev/null || true
          }
          trap cleanup EXIT

          for _ in {1..30}; do
            if cast block-number --rpc-url http://127.0.0.1:8545 >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done
          cast block-number --rpc-url http://127.0.0.1:8545 >/dev/null

          python3 tests/fuzz/fandango/encode_abi_vectors.py --seed corpus \
            < tests/fuzz/fandango/corpus.jsonl \
            > target/runtime-fuzz/fandango-vectors.jsonl

          for seed in 1 2 3; do
            PYTHONHASHSEED=1 "$RUNNER_TEMP/fandango-venv/bin/fandango" fuzz \
              -f tests/fuzz/fandango/abi-values.fan \
              --random-seed "$seed" \
              -n 32 \
              --separator $'\n' \
              --progress-bar off \
              | python3 tests/fuzz/fandango/encode_abi_vectors.py --seed "$seed" \
              >> target/runtime-fuzz/fandango-vectors.jsonl
          done

          python3 tests/fuzz/fandango/run_abi_vectors.py \
            --solc "$RUNNER_TEMP/solc/solc-${SOLC_VERSION}" \
            --solar "$GITHUB_WORKSPACE/target/debug/solar" \
            --max-vectors 160 \
            --max-transactions 64 \
            --max-calldata-bytes 4096 \
            --timeout 20 \
            < target/runtime-fuzz/fandango-vectors.jsonl \
            | tee target/runtime-fuzz/fandango.json

          mkdir -p target/runtime-fuzz/sources
          PYTHONHASHSEED=1 "$RUNNER_TEMP/fandango-venv/bin/fandango" fuzz \
            -f tests/fuzz/fandango/solidity-source.fan \
            --random-seed 1 \
            -n 32 \
            --directory target/runtime-fuzz/sources \
            --filename-extension .sol \
            --progress-bar off

          python3 tests/fuzz/fandango/run_solidity_sources.py \
            --source-dir target/runtime-fuzz/sources \
            --solc "$RUNNER_TEMP/solc/solc-${SOLC_VERSION}" \
            --solar "$GITHUB_WORKSPACE/target/debug/solar" \
            --failure-dir target/runtime-fuzz/source-failures \
            --max-sources 64 \
            --timeout 20 \
            | tee target/runtime-fuzz/fandango-sources.json
      - name: test --features nightly
        if: matrix.rust == 'nightly'
        run: cargo nextest run --workspace --features nightly
      - name: doctest
        run: cargo test --doc --workspace

  feature-checks:
    name: features
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2 # nightly
      - uses: taiki-e/install-action@102b7afb234a5e52ccfd6d63dc218763408b9324 # cargo-hack
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          cache-on-failure: true
      - name: cargo hack
        run: cargo hack check --feature-powerset --depth 1

  wasm:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          cache-on-failure: true
      - name: build wasm
        run: scripts/wasm/dist-wasm.sh
      - name: test soljson
        run: node crates/capi/tests/soljson.js

  typos:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: crate-ci/typos@37bb98842b0d8c4ffebdb75301a13db0267cef89 # v1.47.2

  clippy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@e7a32da269276b4d9cb3a0343133a168355ab751 # clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          cache-on-failure: true
      - run: cargo clippy --workspace --all-targets
        env:
          RUSTFLAGS: -Dwarnings

  docs:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2 # nightly
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          cache-on-failure: true
      - name: Build documentation
        run: cargo doc --workspace --all-features --no-deps --document-private-items
        env:
          RUSTDOCFLAGS: --cfg docsrs -D warnings -Zunstable-options --show-type-layout --generate-link-to-definition

  fmt:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2 # nightly
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  codeql:
    name: analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: "/language:${{matrix.language}}"

  deny:
    uses: tempoxyz/ci/.github/workflows/deny.yml@934b6a6317ac26272eaecf0d265472f4105c99d6 # main
    permissions:
      contents: read

  ci-success:
    name: ci success
    runs-on: ubuntu-latest
    if: always()
    permissions: {}
    needs:
      - test
      - feature-checks
      - wasm
      - typos
      - clippy
      - docs
      - fmt
      - deny
    steps:
      - name: Decide whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # release/v1
        with:
          jobs: ${{ toJSON(needs) }}
