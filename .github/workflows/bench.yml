name: Benchmark

permissions: {}

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      benchmark:
        description: Benchmark family to run
        required: true
        default: all
        type: choice
        options:
          - all
          - codegen-runtime
          - codspeed
          - gungraun
      comparison_ref:
        description: Git ref to use as the Gungraun baseline
        required: true
        default: main
        type: string
      solc_version:
        description: solc release used by the codegen runtime benchmark
        required: true
        default: 0.8.36
        type: string
      benchmark_ref:
        description: solidity-compiler-benchmarks Git ref
        required: true
        default: 01209d2b8ac81645b92e3ef801b5bcdfd61bfd69
        type: string

env:
  CARGO_TERM_COLOR: always
  SOLC_VERSION: ${{ inputs.solc_version || '0.8.36' }}
  BENCHMARK_REPOSITORY: walnuthq/solidity-compiler-benchmarks
  DEFAULT_BENCHMARK_REF: 01209d2b8ac81645b92e3ef801b5bcdfd61bfd69
  BENCHMARK_REF: ${{ inputs.benchmark_ref || '01209d2b8ac81645b92e3ef801b5bcdfd61bfd69' }}
  BENCHMARK_PATH: solidity-compiler-benchmarks

jobs:
  codegen-runtime:
    name: codegen runtime benchmark
    if: >-
      github.event_name != 'workflow_dispatch' ||
      inputs.benchmark == 'all' ||
      inputs.benchmark == 'codegen-runtime'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      actions: read
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Checkout Solar
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Test common benchmark result adapter
        run: |
          python3 -m venv "$RUNNER_TEMP/schema-test"
          "$RUNNER_TEMP/schema-test/bin/pip" install jsonschema==4.25.1
          "$RUNNER_TEMP/schema-test/bin/python" -m unittest discover \
            -s .github/scripts -p 'test_check_codegen_benchmark.py'

      - name: Checkout benchmark corpus
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ env.BENCHMARK_REPOSITORY }}
          ref: ${{ env.BENCHMARK_REF }}
          path: ${{ env.BENCHMARK_PATH }}
          submodules: recursive

      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          cache-on-failure: true

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@b00af27efadbc7b4ca8b82abbd903b17cc874d2a # v1.9.0
        with:
          version: stable

      - name: Install solc
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/solc"
          curl -fsSL \
            "https://github.com/ethereum/solidity/releases/download/v${SOLC_VERSION}/solc-static-linux" \
            -o "$RUNNER_TEMP/solc/solc-${SOLC_VERSION}"
          chmod +x "$RUNNER_TEMP/solc/solc-${SOLC_VERSION}"
          "$RUNNER_TEMP/solc/solc-${SOLC_VERSION}" --version

      - name: Build Solar
        run: cargo build -p solar-compiler --bin solar

      - name: Download baseline (main branch)
        id: baseline
        if: inputs.benchmark_ref == '' || inputs.benchmark_ref == env.DEFAULT_BENCHMARK_REF
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p target/codegen-bench/baseline

          run_id="$(
            gh run list \
              --workflow bench.yml \
              --branch main \
              --event push \
              --status success \
              --limit 1 \
              --json databaseId \
              --jq '.[0].databaseId // ""' \
              2>/dev/null || true
          )"
          if [[ -z "$run_id" ]]; then
            echo "::warning::No successful main benchmark run was found for baseline comparison"
            exit 0
          fi

          if ! gh run download "$run_id" \
            --name codegen-runtime-baseline \
            --dir target/codegen-bench/baseline; then
            echo "::warning::No main baseline artifact was available for comparison"
          fi

      - name: Run micro codegen benchmark
        id: micro-bench
        working-directory: ${{ env.BENCHMARK_PATH }}
        run: |
          set -euo pipefail
          mkdir -p "$GITHUB_WORKSPACE/target/codegen-bench"
          timing="$GITHUB_WORKSPACE/target/codegen-bench/micro-timing.json"
          if /usr/bin/time -q -f '{"wall_time_seconds": %e}' -o "$timing.tmp" \
            python3 ./solar_bench.py --verbose \
            --solc "$RUNNER_TEMP/solc/solc-${SOLC_VERSION}" \
            --solar "$GITHUB_WORKSPACE/target/debug/solar" \
            --suite micro \
            --gas \
            --gas-profile hot \
            --start-anvil \
            --allow-failures \
            --output "$GITHUB_WORKSPACE/target/codegen-bench/micro.json"; then
            mv "$timing.tmp" "$timing"
          else
            rm -f "$timing.tmp"
            echo "::warning::Micro codegen benchmark failed to complete"
          fi

      - name: Run repository codegen benchmark
        id: repo-bench
        working-directory: ${{ env.BENCHMARK_PATH }}
        run: |
          set -euo pipefail
          mkdir -p "$GITHUB_WORKSPACE/target/codegen-bench"
          timing="$GITHUB_WORKSPACE/target/codegen-bench/repo-timing.json"
          if /usr/bin/time -q -f '{"wall_time_seconds": %e}' -o "$timing.tmp" \
            python3 ./solar_bench.py --verbose \
            --solc "$RUNNER_TEMP/solc/solc-${SOLC_VERSION}" \
            --solar "$GITHUB_WORKSPACE/target/debug/solar" \
            --suite repo \
            --gas \
            --gas-profile hot \
            --start-anvil \
            --allow-failures \
            --output "$GITHUB_WORKSPACE/target/codegen-bench/repo.json"; then
            mv "$timing.tmp" "$timing"
          else
            rm -f "$timing.tmp"
            echo "::warning::Repository codegen benchmark failed to complete"
          fi

      - name: Generate runtime benchmark report
        id: runtime-report
        if: always()
        env:
          BENCHMARK_PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          BENCHMARK_PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          mkdir -p target/codegen-bench
          args=(
            --micro target/codegen-bench/micro.json
            --repo target/codegen-bench/repo.json
            --micro-timing target/codegen-bench/micro-timing.json
            --repo-timing target/codegen-bench/repo-timing.json
            --common-output target/codegen-bench/common.json
          )
          if [[ -f target/codegen-bench/baseline/micro.json ]]; then
            args+=(--baseline-micro target/codegen-bench/baseline/micro.json)
          fi
          if [[ -f target/codegen-bench/baseline/repo.json ]]; then
            args+=(--baseline-repo target/codegen-bench/baseline/repo.json)
          fi
          python3 .github/scripts/check_codegen_benchmark.py "${args[@]}" \
            | tee target/codegen-bench/report.md
          {
            echo 'report<<EOF'
            cat target/codegen-bench/report.md
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Comment on PR
        if: >-
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository
        uses: marocchino/sticky-pull-request-comment@5770ad5eb8f42dd2c4f34da00c94c5381e49af88 # v3.0.5
        with:
          header: codegen-runtime-bench
          message: ${{ steps.runtime-report.outputs.report }}
          only_update: ${{ steps.runtime-report.outputs.should_comment != 'true' }}

      - name: Upload results as artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: codegen-runtime-results
          path: target/codegen-bench/
          retention-days: 30
          if-no-files-found: ignore

      - name: Save baseline (main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: codegen-runtime-baseline
          path: |
            target/codegen-bench/micro.json
            target/codegen-bench/repo.json
          retention-days: 90
          if-no-files-found: ignore

  codspeed:
    if: >-
      github.event_name != 'workflow_dispatch' ||
      inputs.benchmark == 'all' ||
      inputs.benchmark == 'codspeed'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true
      - name: Checkout submodules
        run: git submodule update --checkout
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          cache-on-failure: true
      - name: Install cargo-codspeed
        uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2.83.2
        with:
          tool: cargo-codspeed
      - name: Build the benchmark target(s)
        run: cargo codspeed build --profile profiling -p solar-bench --bench criterion
      - name: Run the benchmarks
        uses: CodSpeedHQ/action@f99becdce5e5d51fd556489ebef684f4ecfd6286 # v4.18.5
        with:
          run: cargo codspeed run -p solar-bench criterion
          mode: instrumentation
          token: ${{ secrets.CODSPEED_TOKEN }}

  gungraun:
    if: >-
      github.event_name != 'workflow_dispatch' ||
      inputs.benchmark == 'all' ||
      inputs.benchmark == 'gungraun'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      BASELINE: base
      COMPARISON_REF: ${{ inputs.comparison_ref || github.base_ref || 'main' }}
      IAI_CALLGRIND_RUNNER: iai-callgrind-runner
      GUNGRAUN_RUNNER: gungraun-runner
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true
      - name: Checkout submodules
        run: git submodule update --checkout
      - name: Install Valgrind
        run: sudo apt update && sudo apt install valgrind
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: stable
      - name: Install cargo-binstall
        uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2.83.2
        with:
          tool: cargo-binstall
      - name: Checkout base
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ env.COMPARISON_REF }}
          fetch-depth: 2
      - name: Checkout HEAD^
        if: github.event_name == 'push'
        run: git checkout HEAD^
      - name: Checkout base submodules
        run: |
          git submodule sync --recursive
          git submodule update --init --recursive --checkout
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          cache-on-failure: true
      - name: Install benchmark runner
        run: |
          package=$(cargo metadata --format-version=1 | jq -r '.packages[] | select(.name == "gungraun" or .name == "iai-callgrind").name' | head -n1)
          version=$(cargo metadata --format-version=1 | jq -r --arg package "$package" '.packages[] | select(.name == $package).version')
          case "$package" in
            gungraun) runner=gungraun-runner ;;
            iai-callgrind) runner=iai-callgrind-runner ;;
            *) echo "unknown benchmark runner package: $package" && exit 1 ;;
          esac
          cargo binstall "$runner" --version "$version" --no-confirm --no-symlinks --force
          which "$runner"
      - name: Save baseline
        run: |
          bench_target=$(cargo metadata --no-deps --format-version=1 | jq -r '.packages[] | select(.name == "solar-bench").targets[] | select(any(.kind[]; . == "bench") and (.name == "gungraun" or .name == "iai")).name' | head -n1)
          cargo bench -p solar-bench --bench "$bench_target" --features ci -- --save-baseline="$BASELINE"
          if [ "$bench_target" = "iai" ] && [ -d target/iai ] && [ ! -e target/gungraun ]; then
            mv target/iai target/gungraun
          fi
      - name: Checkout candidate
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          clean: false
      - name: Checkout candidate submodules
        run: |
          git submodule sync --recursive
          git submodule update --init --recursive --checkout
      - name: Install benchmark runner
        run: |
          version=$(cargo metadata --format-version=1 | jq -r '.packages[] | select(.name == "gungraun").version')
          cargo binstall gungraun-runner --version "$version" --no-confirm --no-symlinks --force
          which gungraun-runner
      - name: Compare candidate benchmarks
        run: cargo bench -p solar-bench --bench gungraun --features ci -- --baseline="$BASELINE"
