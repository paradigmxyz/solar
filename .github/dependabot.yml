version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: UTC
    cooldown:
      default-days: 7
    groups:
      ci-weekly:
        patterns:
          - "*"
        update-types:
          - "major"
    exclude-paths:
      # release.yml is autogenerated by cargo-dist.
      - ".github/workflows/release.yml"
